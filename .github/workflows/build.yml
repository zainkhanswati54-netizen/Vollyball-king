name: Build Spike Zone

on:
  push:
    branches: [main]
  pull_request:

# Prevents two workflow runs from deploying to Pages at the same time —
# if you push twice quickly, the second run waits for the first to finish
# instead of racing it (which is what produces "Deployment failed, try
# again later" from actions/deploy-pages).
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  analyze-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable' # always resolve latest stable, kept in sync with whatever `pub get` picks

      - run: flutter pub get
      - run: flutter analyze
      - run: flutter test

  build-web:
    needs: analyze-and-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - run: flutter pub get
      - name: Generate missing web platform files
        run: flutter create . --platforms=web
      - run: flutter pub get
      - run: flutter build web --release --base-href /Vollyball-king/

      - name: Upload web build artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

  deploy-pages:
    needs: build-web
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  build-android:
    needs: analyze-and-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - run: flutter pub get
      - name: Generate missing Android platform files
        run: flutter create . --platforms=android
      - run: flutter pub get
      - run: flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: spike-zone-apk
          path: build/app/outputs/flutter-apk/app-release.apk
